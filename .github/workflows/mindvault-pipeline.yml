name: MindVault CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Verify the React Frontend
  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint Checks
        run: |
          cd frontend
          npm run lint --if-present

      - name: Test Frontend Production Build
        run: |
          cd frontend
          npm run build

  # JOB 2: Verify the Node Backend
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      # Mock environments variables so the backend doesn't crash during basic compilation checks
      - name: Validate Backend App Configuration
        run: |
          cd backend
          node -e "try { require('./src/server.js'); console.log('Syntax check passed'); process.exit(0); } catch(e) { if(e.message.includes('Mongoose') || e.message.includes('Redis')) { console.log('App loaded but missing DB credentials - expected.'); process.exit(0); } else { console.error(e); process.exit(1); } }"
        env:
          PORT: 5000
          NODE_ENV: test
          SESSION_SECRET: CI_TEST_SECRET
          UPSTASH_REDIS_REST_URL: https://upstash.io
          UPSTASH_REDIS_REST_TOKEN: mock_token
          MONGO_URL: mongodb://localhost:27017/mockdb

  # JOB 3: Automate Release to Render
  deploy-to-render:
    needs: [frontend-validation, backend-validation] # Both jobs must completely pass!
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only runs on merge/push to main

    steps:
      - name: Trigger Render Deploy Webhook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
